<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arbeitsblatt Vorschau</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc; /* Tailwind gray-50 */
            color: #1e293b; /* Tailwind slate-800 */
        }
        .container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 2rem;
            background-color: #ffffff;
            border-radius: 0.5rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        h1, h2, h3, h4, h5, h6 {
            font-weight: 600; /* Tailwind font-semibold */
            margin-top: 1.5rem;
            margin-bottom: 1rem;
            line-height: 1.25;
        }
        h1 { font-size: 2.25rem; } /* Tailwind text-4xl */
        h2 { font-size: 1.875rem; } /* Tailwind text-3xl */
        h3 { font-size: 1.5rem; }  /* Tailwind text-2xl */
        p {
            margin-bottom: 1rem;
            line-height: 1.625;
        }
        ul, ol {
            margin-bottom: 1rem;
            padding-left: 1.5rem;
        }
        ul li { list-style-type: disc; }
        ol li { list-style-type: decimal; }
        code {
            background-color: #e2e8f0; /* Tailwind gray-200 */
            padding: 0.2em 0.4em;
            border-radius: 0.25rem;
            font-family: monospace;
        }
        pre {
            background-color: #1e293b; /* Tailwind slate-800 */
            color: #f8fafc; /* Tailwind gray-50 */
            padding: 1rem;
            border-radius: 0.5rem;
            overflow-x: auto;
            margin-bottom: 1rem;
        }
        blockquote {
            border-left: 4px solid #a78bfa; /* Tailwind purple-400 */
            padding-left: 1rem;
            color: #64748b; /* Tailwind slate-500 */
            margin-left: 0;
            margin-right: 0;
            margin-bottom: 1rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1rem;
        }
        th, td {
            border: 1px solid #e2e8f0; /* Tailwind gray-200 */
            padding: 0.75rem;
            text-align: left;
        }
        th {
            background-color: #f1f5f9; /* Tailwind gray-100 */
            font-weight: 600;
        }
        a {
            color: #7c3aed; /* Tailwind violet-600 */
            text-decoration: underline;
        }
        img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 1rem 0;
            border-radius: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-3xl font-bold mb-4">Arbeitsblatt Vorschau</h1>
        <div id="markdown-output" class="prose"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const markdownContent = `{{ markdown_content | escape | safe }}`;
            document.getElementById('markdown-output').innerHTML = marked.parse(markdownContent);
        });
    </script>
</body>
</html>
