<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ detail.name }} - Learn-AI Version</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body class="launcher-body">
    <div class="launcher-shell">
        <header class="main-header">
            <div class="header-left">
                <a href="{{ url_for('index') }}" class="icon-circle back-link" title="Zur Übersicht">
                    <span class="material-symbols-outlined">arrow_back</span>
                </a>
                <div>
                    <h1>{{ detail.name }}</h1>
                    <p>{{ detail.path }}</p>
                </div>
            </div>
        </header>

        <main class="detail-page">
            <section class="stage-head">
                <div>
                    <h2 id="detail-title">{{ detail.name }}</h2>
                    <p class="detail-path" id="detail-path">{{ detail.path }}</p>
                </div>
                <div class="stage-actions">
                    <button type="button" class="ghost-button {{ 'hidden' if not detail.running else '' }}" id="interaction-toggle">
                        <span class="material-symbols-outlined">touch_app</span>
                        Interaktion aktivieren
                    </button>
                    <button type="button" class="ghost-button {{ 'hidden' if detail.running else '' }}" id="start-button" data-version-name="{{ detail.path }}">
                        <span class="material-symbols-outlined">play_arrow</span>
                        Starten
                    </button>
                    <button type="button" class="gradient-button" id="restart-button" data-version-name="{{ detail.path }}">
                        <span class="material-symbols-outlined">replay</span>
                        Neu starten
                    </button>
                </div>
            </section>

            <div class="top-metrics" id="detail-stats">
                <div class="metric-card"><span>Dateien</span><strong>{{ detail.file_count }}</strong></div>
                <div class="metric-card"><span>Ordner</span><strong>{{ detail.dir_count }}</strong></div>
                <div class="metric-card"><span>Port</span><strong>{{ detail.port or "-" }}</strong></div>
            </div>

            <section class="preview-toolbar" id="preview-toolbar">
                <label class="toolbar-field">
                    <span>Breite</span>
                    <select id="preview-width">
                        <option value="100">100%</option>
                        <option value="90">90%</option>
                        <option value="80">80%</option>
                        <option value="70">70%</option>
                        <option value="60">60%</option>
                    </select>
                </label>
                <label class="toolbar-field toolbar-field-grow">
                    <span>Höhe</span>
                    <input id="preview-height" type="range" min="480" max="1600" step="20" value="704">
                </label>
                <output class="toolbar-value" id="preview-height-value">704 px</output>
            </section>

            <section class="preview-shell">
                <div class="preview-frame-wrap" id="live-preview-frame"></div>
            </section>

            <section class="info-grid single-column">
                <article class="info-card">
                    <pre class="log-view" id="log-view">Noch keine Logs vorhanden.</pre>
                </article>
            </section>
        </main>
    </div>

    <script>
        window.__INITIAL_DETAIL__ = {{ detail|tojson }};
    </script>
    <script src="{{ url_for('static', filename='js/version.js') }}"></script>
</body>
</html>
